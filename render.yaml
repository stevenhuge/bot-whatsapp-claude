services:
  - type: worker
    name: whatsapp-ai-bot
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PHONE_NUMBER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOW_GROUPS
        value: false
      - key: MAX_TOKENS
        value: 1024
